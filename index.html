<script>
  // ============================================
  // Google Apps Script Web App URL
  // ============================================

  const APPS_SCRIPT_URL =
    'https://script.google.com/a/macros/uodiyala.edu.iq/s/AKfycbzuKhy_Pkii94I0S44ppEbis0Al4kbmg1rTpNwwuQZ7IQ4qc4dhr42F1oLO7QWsCI_E/exec';

  // ============================================
  // Config
  // ============================================

  const SUBMIT_TOKEN = 'COMM_ENG_2026';

  let current = 0;

  // ============================================
  // Elements
  // ============================================

  const steps =
    Array.from(document.querySelectorAll('.step'));

  const bar =
    document.getElementById('bar');

  const stepText =
    document.getElementById('stepText');

  const prevBtn =
    document.getElementById('prevBtn');

  const nextBtn =
    document.getElementById('nextBtn');

  const submitBtn =
    document.getElementById('submitBtn');

  const message =
    document.getElementById('message');

  const form =
    document.getElementById('facultyForm');

  // ============================================
  // Step Navigation
  // ============================================

  function showStep(index){

    steps.forEach((step, i) => {

      step.classList.toggle(
        'active',
        i === index
      );
    });

    const progress =
      ((index + 1) / steps.length) * 100;

    bar.style.width = progress + '%';

    stepText.textContent =
      `الخطوة ${index + 1} من ${steps.length}`;

    prevBtn.style.display =
      index === 0
        ? 'none'
        : 'inline-block';

    nextBtn.style.display =
      index === steps.length - 1
        ? 'none'
        : 'inline-block';

    submitBtn.style.display =
      index === steps.length - 1
        ? 'inline-block'
        : 'none';

    window.scrollTo({
      top: 0,
      behavior: 'smooth'
    });
  }

  // ============================================
  // Validation
  // ============================================

  function validateCurrent(){

    const requiredFields =
      Array.from(
        steps[current]
          .querySelectorAll('[required]')
      );

    for(const field of requiredFields){

      if(!field.checkValidity()){

        field.reportValidity();

        field.focus();

        return false;
      }
    }

    return true;
  }

  // ============================================
  // Buttons
  // ============================================

  nextBtn.onclick = () => {

    if(
      validateCurrent() &&
      current < steps.length - 1
    ){

      current++;

      showStep(current);
    }
  };

  prevBtn.onclick = () => {

    if(current > 0){

      current--;

      showStep(current);
    }
  };

  // ============================================
  // Initialize
  // ============================================

  showStep(current);

  // ============================================
  // Submit Form
  // ============================================

  form.addEventListener(
    'submit',
    async function(e){

      e.preventDefault();

      if(!validateCurrent()) return;

      // Check URL
      if(
        !APPS_SCRIPT_URL ||
        APPS_SCRIPT_URL.includes(
          'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE'
        )
      ){

        showMessage(
          'err',
          'رابط Google Apps Script غير مضبوط.'
        );

        return;
      }

      // UI Loading
      submitBtn.disabled = true;

      submitBtn.textContent =
        'جاري إرسال البيانات...';

      // Form Data
      const formData =
        new FormData(form);

      const payload =
        Object.fromEntries(
          formData.entries()
        );

      payload.token = SUBMIT_TOKEN;

      payload.timestamp =
        new Date().toISOString();

      try{

        const response = await fetch(
          APPS_SCRIPT_URL,
          {
            method: 'POST',

            headers: {
              'Content-Type':
                'text/plain;charset=utf-8'
            },

            body: JSON.stringify(payload)
          }
        );

        const text =
          await response.text();

        let result = {};

        try{

          result = JSON.parse(text);

        }catch(parseError){

          throw new Error(
            'Invalid server response'
          );
        }

        // Success
        if(result.status === 'success'){

          showMessage(
            'ok',
            'تم إرسال البيانات بنجاح.'
          );

          form.reset();

          current = 0;

          showStep(current);

        }

        // Duplicate
        else if(
          result.status === 'duplicate'
        ){

          showMessage(
            'err',
            result.message ||
            'هذا البريد مسجل مسبقاً.'
          );
        }

        // Generic Error
        else{

          showMessage(
            'err',
            result.message ||
            'تعذر إرسال البيانات.'
          );
        }

      }catch(error){

        console.error(error);

        showMessage(
          'err',
          'حدث خطأ في الاتصال بالخادم. يرجى المحاولة لاحقاً.'
        );

      }finally{

        submitBtn.disabled = false;

        submitBtn.textContent =
          'إرسال البيانات';
      }
    }
  );

  // ============================================
  // Message Helper
  // ============================================

  function showMessage(type, text){

    message.className =
      'msg ' + type;

    message.textContent = text;

    message.style.display = 'block';

    window.scrollTo({
      top: document.body.scrollHeight,
      behavior: 'smooth'
    });
  }
</script>
